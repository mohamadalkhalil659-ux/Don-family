<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Don Paste Pro+</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  margin: 0;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 140px;
  border-radius: 10px;
  border: none;
  padding: 10px;
}

button {
  padding: 10px 14px;
  background: #22c55e;
  border: none;
  color: white;
  margin: 5px;
  cursor: pointer;
  border-radius: 8px;
}

.box {
  background: #1e293b;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  text-align: left;
}

.topbar {
  background: #0f172a;
  padding: 10px;
  margin-bottom: 20px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="topbar">
<h2>🚀 Don Paste Pro+</h2>
<button onclick="login()">Google Login</button>
<button onclick="home()">🏠 Home</button>
<button onclick="profile()">👤 Profile</button>
<p id="user"></p>
</div>

<div class="container">

<textarea id="text" placeholder="اكتب نصك هنا..."></textarea><br>

<button onclick="save()">💾 حفظ</button>
<button onclick="myPastes()">📁 نصوصي</button>

<div id="result"></div>

</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
  authDomain: "don-paste-189e9.firebaseapp.com",
  projectId: "don-paste-189e9",
  storageBucket: "don-paste-189e9.appspot.com",
  messagingSenderId: "177445092040",
  appId: "1:177445092040:web:fa22e602fee9fdfd4103fd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editId = null;


// 🔐 login
function login(){
 let provider = new firebase.auth.GoogleAuthProvider();
 firebase.auth().signInWithPopup(provider);
}


// 👤 user state
firebase.auth().onAuthStateChanged(user=>{
 if(user){
  document.getElementById("user").innerText = "👤 " + user.email;
 }
});


// 💾 save + short link + views
function save(){
 let user = firebase.auth().currentUser;
 if(!user) return alert("سجّل دخول أولاً");

 let text = document.getElementById("text").value;

 if(editId){
   db.collection("pastes").doc(editId).update({
     content: text
   });
   editId = null;
   alert("تم التعديل");
   return;
 }

 db.collection("pastes").add({
  content: text,
  userId: user.uid,
  email: user.email,
  views: 0,
  created: Date.now()
 }).then(doc=>{
  let link = location.href + "#p=" + doc.id;

  document.getElementById("result").innerHTML =
  `<div class="box">
    🔗 رابطك:<br>
    <a href="${link}" style="color:#22c55e">${link}</a>
  </div>`;
 });
}


// 📁 my pastes
function myPastes(){
 let user = firebase.auth().currentUser;
 if(!user) return;

 db.collection("pastes")
 .where("userId","==",user.uid)
 .get()
 .then(snap=>{

  let html = "<div class='container'><h2>📁 نصوصي</h2>";

  snap.forEach(doc=>{
    let d = doc.data();

    html += `
    <div class="box">
      <pre>${d.content}</pre>
      <small>👁 ${d.views || 0} views</small><br>

      <button onclick="edit('${doc.id}','${d.content}')">✏ تعديل</button>
      <button onclick="del('${doc.id}')">🗑 حذف</button>
    </div>`;
  });

  document.body.innerHTML = html + "</div>";
 });
}


// ✏ edit
function edit(id, text){
 editId = id;
 document.getElementById("text").value = text;
}


// 🗑 delete
function del(id){
 db.collection("pastes").doc(id).delete();
 alert("تم الحذف");
}


// 👤 profile (earn system)
function profile(){
 let user = firebase.auth().currentUser;
 if(!user) return;

 db.collection("pastes")
 .where("userId","==",user.uid)
 .get()
 .then(snap=>{

  let views = 0;

  snap.forEach(d=>{
   views += (d.data().views || 0);
  });

  document.body.innerHTML = `
  <div class="container">
    <h2>👤 Profile</h2>
    <p>${user.email}</p>
    <div class="box">
      📊 عدد النصوص: ${snap.size}<br>
      👁 إجمالي المشاهدات: ${views}<br>
      💰 الأرباح: ${(views * 0.001).toFixed(2)} $
    </div>
  </div>`;
 });
}


// 🏠 home
function home(){
 location.reload();
}


// 🔗 open paste + views counter
window.onload = function(){
 let id = location.hash.replace("#p=","");

 if(id){
  let ref = db.collection("pastes").doc(id);

  ref.get().then(doc=>{
   if(doc.exists){
    ref.update({
      views: (doc.data().views || 0) + 1
    });

    document.body.innerHTML =
    `<div class="container">
      <pre>${doc.data().content}</pre>
    </div>`;
   }
  });
 }
}

</script>

</body>
</html>
