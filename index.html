<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global SaaS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* 🔝 Navbar */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
  position:relative;
}

.logo{
  font-size:18px;
  font-weight:bold;
}

/* ☰ menu button */
.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* 📋 menu box */
.menu{
  position:absolute;
  top:60px;
  right:10px;
  background:#1e293b;
  width:220px;
  border-radius:10px;
  display:none;
  flex-direction:column;
  overflow:hidden;
}

.menu button{
  padding:12px;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#334155;
}

/* 🎯 center hero */
.hero{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h1{
  font-size:40px;
  margin:0;
}

.hero p{
  color:#94a3b8;
}
</style>

</head>

<body>

<!-- 🔝 NAV -->
<nav>
  <div class="logo">🚀 Global SaaS</div>

  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">

    <button onclick="home()">🏠 بيت</button>
    <button onclick="pricing()">💰 أسعار الناشر (CPM)</button>
    <button onclick="payments()">💳 إثباتات الدفع</button>
    <button onclick="login()">🔐 تسجيل دخول</button>
    <button onclick="signup()">➕ إنشاء حساب</button>

  </div>
</nav>

<!-- 🎯 CENTER -->
<div class="hero">
  <h1>أهلاً بك في الموقع</h1>
  <p>نظام نشر وربح احترافي عالمي</p>
</div>

<script>

// ☰ open/close menu
function toggleMenu(){
  let m=document.getElementById("menu");
  m.style.display = (m.style.display==="flex") ? "none" : "flex";
}

// 🏠 home
function home(){
 location.reload();
}

// 💰 pricing
function pricing(){
 alert("CPM: 1$ - 5$ لكل 1000 مشاهدة (حسب الدولة)");
}

// 💳 payments
function payments(){
 alert("إثباتات الدفع سيتم إضافتها لاحقاً");
}

// 🔐 login
function login(){
 alert("صفحة تسجيل الدخول");
}

// ➕ signup
function signup(){
 alert("صفحة إنشاء حساب");
}

</script>

</body>
</html>
