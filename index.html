<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Don Paste Pro</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 160px;
  border-radius: 10px;
  border: none;
  padding: 10px;
}

button {
  padding: 10px 15px;
  background: #22c55e;
  border: none;
  color: white;
  margin: 5px;
  cursor: pointer;
  border-radius: 8px;
}

.box {
  background: #1e293b;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  text-align: left;
}

.small {
  font-size: 12px;
  color: #aaa;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="container">

<h1>🚀 Don Paste Pro</h1>

<div class="box">نظام متطور لإدارة النصوص</div>

<button onclick="login()">تسجيل الدخول Google</button>
<button onclick="profile()">👤 ملفي</button>

<p id="user"></p>

<textarea id="text" placeholder="اكتب النص هنا..."></textarea><br>

<button onclick="save()">حفظ</button>
<button onclick="myPastes()">📁 نصوصي</button>

<div id="result"></div>

</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
  authDomain: "don-paste-189e9.firebaseapp.com",
  projectId: "don-paste-189e9",
  storageBucket: "don-paste-189e9.appspot.com",
  messagingSenderId: "177445092040",
  appId: "1:177445092040:web:fa22e602fee9fdfd4103fd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentEditId = null;


// 🔐 تسجيل الدخول
function login(){
  let provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}


// 👤 الحالة
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText =
    "👤 " + user.email;
  } else {
    document.getElementById("user").innerText = "";
  }
});


// 💾 حفظ / تعديل
function save(){
 let user = firebase.auth().currentUser;
 if(!user) return alert("سجّل دخول أولاً");

 let text = document.getElementById("text").value;

 if(currentEditId){

   db.collection("pastes").doc(currentEditId).update({
     content: text
   });

   currentEditId = null;
   alert("تم التعديل");
   return;
 }

 db.collection("pastes").add({
  content: text,
  userId: user.uid,
  email: user.email,
  date: new Date().toString()
 });

 alert("تم الحفظ");
}


// 📁 نصوصي فقط
function myPastes(){
 let user = firebase.auth().currentUser;
 if(!user) return alert("سجّل دخول أولاً");

 db.collection("pastes")
 .where("userId","==",user.uid)
 .get()
 .then(snap=>{

   let html = "<div class='container'><h2>📁 نصوصي</h2>";

   snap.forEach(doc=>{
     let d = doc.data();

     html += `
     <div class="box">
       <pre>${d.content}</pre>
       <button onclick="edit('${doc.id}','${d.content}')">✏ تعديل</button>
       <button onclick="del('${doc.id}')">🗑 حذف</button>
     </div>`;
   });

   html += "</div>";
   document.body.innerHTML = html;
 });
}


// ✏ تعديل
function edit(id, text){
  currentEditId = id;
  document.getElementById("text").value = text;
}


// 🗑 حذف
function del(id){
  db.collection("pastes").doc(id).delete();
  alert("تم الحذف");
}


// 👤 Profile
function profile(){
 let user = firebase.auth().currentUser;
 if(!user) return alert("سجّل دخول أولاً");

 db.collection("pastes")
 .where("userId","==",user.uid)
 .get()
 .then(snap=>{

   let html = `
   <div class="container">
   <h2>👤 ملفي</h2>
   <p class="small">${user.email}</p>
   <hr>`;

   html += `<p>عدد النصوص: ${snap.size}</p>`;

   html += "</div>";

   document.body.innerHTML = html;
 });
}

</script>

</body>
</html>
