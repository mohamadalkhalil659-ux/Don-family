<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Don Family</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#222; color:#fff; padding:15px; text-align:center; position:relative; }
    .menu { position:absolute; right:15px; top:15px; cursor:pointer; }
    .menu-content { display:none; position:absolute; right:15px; top:50px; background:#fff; color:#000; border:1px solid #ccc; }
    .menu-content button { display:block; width:150px; padding:10px; border:none; background:#eee; cursor:pointer; }
    .container { padding:20px; text-align:center; }
    input, textarea { width:80%; padding:10px; margin:10px 0; }
    button.main { padding:10px 20px; }
    .card { background:#fff; padding:20px; margin:10px auto; width:80%; border-radius:10px; }
  </style>
</head>
<body><header>
  <div class="menu" onclick="toggleMenu()">☰</div>
  <h1>Don Family</h1>
  <div class="menu-content" id="menu">
    <button>أسعار النشر</button>
    <button>إثباتات الدفع</button>
    <button onclick="showWithdraw()">طلب سحب</button>
  </div>
</header><div class="container" id="userPage">
  <div class="card">
    <h3>اختصار رابط أو كتابة نص</h3>
    <textarea id="content" placeholder="اكتب الرابط أو النص هنا"></textarea><br>
    <button class="main" onclick="createLink()">إنشاء</button>
  </div>
</div><div class="container" id="resultPage" style="display:none;">
  <div class="card">
    <h3>الرابط المختصر / النص</h3>
    <p id="result"></p>
    <h4>إعلانات</h4>
    <p id="ads">(سيتم وضع الإعلانات من الأدمن)</p>
    <p>عدد الزوار: 0</p>
    <p>كمية الربح: 0$</p>
  </div>
</div><div class="container" id="adminPage" style="display:none;">
  <div class="card">
    <h3>طلبات السحب</h3>
    <p>(بيانات طلبات السحب تظهر هنا)</p>
  </div>
  <div class="card">
    <h3>إدارة الإعلانات</h3>
    <textarea placeholder="أدخل الإعلان هنا"></textarea>
  </div>
</div><script>
function toggleMenu() {
  var menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function createLink() {
  var content = document.getElementById("content").value;
  document.getElementById("result").innerText = content;
  document.getElementById("userPage").style.display = "none";
  document.getElementById("resultPage").style.display = "block";
}

function showWithdraw() {
  alert("صفحة السحب (قيد التطوير)");
}
</script></body>
</html>
