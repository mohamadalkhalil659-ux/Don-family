<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global SaaS Paste</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{max-width:900px;margin:auto;padding:20px}

textarea{width:100%;height:140px;border:none;border-radius:10px;padding:10px}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.box{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}

.ad{
  background:#111827;
  padding:10px;
  margin:10px 0;
  border:1px dashed #444;
}

a{color:#22c55e}

.top{
  background:#0f172a;
  padding:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="top">
<h2>🚀 Global SaaS Paste</h2>

<button onclick="login()">Login</button>
<button onclick="home()">Home</button>
<button onclick="dashboard()">Dashboard</button>
<button onclick="admin()">Admin</button>

<p id="user"></p>
</div>

<div class="container" id="app">

<!-- 🔥 Ad 1 -->
<div class="ad">Ad Space 1</div>

<textarea id="text"></textarea>

<!-- 🔥 Ad 2 -->
<div class="ad">Ad Space 2</div>

<button onclick="create()">Create Paste</button>

<div id="result"></div>

</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
 apiKey:"AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
 authDomain:"don-paste-189e9.firebaseapp.com",
 projectId:"don-paste-189e9",
 storageBucket:"don-paste-189e9.appspot.com",
 messagingSenderId:"177445092040",
 appId:"1:177445092040:web:fa22e602fee9fdfd4103fd"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let ADMIN_UID="CHANGE_THIS";

// 🔐 login
function login(){
 let p=new firebase.auth.GoogleAuthProvider();
 firebase.auth().signInWithPopup(p);
}

// 👤 user
firebase.auth().onAuthStateChanged(u=>{
 if(u) document.getElementById("user").innerText=u.email;
});

// slug
function slug(){
 return Math.random().toString(36).substring(2,8);
}

// 🏠 home
function home(){
 location.reload();
}

// 💾 create paste
function create(){
 let u=firebase.auth().currentUser;
 if(!u) return alert("Login first");

 let text=document.getElementById("text").value;
 let id=slug();

 db.collection("pastes").doc(id).set({
  content:text,
  userId:u.uid,
  email:u.email,
  views:0,
  created:Date.now()
 });

 let link=location.origin+"?p="+id;

 document.getElementById("result").innerHTML=
 `<div class="box">🔗 <a href="${link}">${link}</a></div>`;
}

// 📊 dashboard
function dashboard(){
 let u=firebase.auth().currentUser;
 if(!u) return;

 db.collection("pastes").where("userId","==",u.uid).get()
 .then(s=>{
  let html="<div class='container'><h2>Dashboard</h2>";

  s.forEach(d=>{
   html+=`
   <div class="box">
    ${d.data().content}
    <br>👁 ${d.data().views}
   </div>`;
  });

  document.getElementById("app").innerHTML=html+"</div>";
 });
}

// 🛠 admin panel
function admin(){
 let u=firebase.auth().currentUser;
 if(!u) return;

 if(u.uid!==ADMIN_UID){
  alert("No access");
  return;
 }

 db.collection("pastes").get().then(s=>{
  let html="<div class='container'><h2>Admin Panel</h2>";

  s.forEach(d=>{
   html+=`
   <div class="box">
    ${d.data().content}
    <br>
    <button onclick="del('${d.id}')">Delete</button>
   </div>`;
  });

  document.getElementById("app").innerHTML=html+"</div>";
 });
}

// delete
function del(id){
 db.collection("pastes").doc(id).delete();
 alert("Deleted");
}

// 🔗 open paste + views
window.onload=function(){

 let p=new URLSearchParams(location.search).get("p");

 if(p){
  let ref=db.collection("pastes").doc(p);

  ref.get().then(doc=>{
   if(doc.exists){

    ref.update({
     views:(doc.data().views||0)+1
    });

    let e=(doc.data().views||0)*0.001;

    document.body.innerHTML=`
    <div class="container">

      <div class="ad">Ad Top</div>

      <pre>${doc.data().content}</pre>

      <div class="ad">Ad Bottom</div>

      <div class="box">
        👁 Views: ${doc.data().views}<br>
        💰 Earnings: $${e.toFixed(3)}
      </div>

    </div>`;
   }
  });
 }
}

</script>

</body>
</html>
