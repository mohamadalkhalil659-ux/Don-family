<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro SaaS App</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

nav{
  background:#111827;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.container{max-width:900px;margin:auto;padding:20px}

input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.ad{
  border:1px dashed #444;
  padding:10px;
  margin:10px 0;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<nav>
<div>🚀 Pro SaaS</div>
<div>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>
</nav>

<div class="container">

<h2>Dashboard</h2>

<div class="ad">AdSense Slot 1</div>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="signin()">Sign In</button>

<div class="ad">AdSense Slot 2</div>

<textarea id="text"></textarea>
<button onclick="save()">Save API Data</button>

<div id="out"></div>

</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
 apiKey:"AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
 authDomain:"don-paste-189e9.firebaseapp.com",
 projectId:"don-paste-189e9"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// 👤 AUTH EMAIL/PASS
function signup(){
 firebase.auth().createUserWithEmailAndPassword(
 document.getElementById("email").value,
 document.getElementById("pass").value
 );
}

function signin(){
 firebase.auth().signInWithEmailAndPassword(
 document.getElementById("email").value,
 document.getElementById("pass").value
 );
}

function login(){
 alert("Use email/password");
}

function logout(){
 firebase.auth().signOut();
}

// 👤 user state
firebase.auth().onAuthStateChanged(u=>{
 if(u){
  document.getElementById("out").innerHTML=
  "Welcome: "+u.email;
 }
});

// 💾 API SAVE
function save(){
 let u=firebase.auth().currentUser;
 if(!u) return alert("Login first");

 db.collection("data").add({
  text:document.getElementById("text").value,
  uid:u.uid,
  email:u.email,
  time:Date.now()
 });

 alert("Saved to API (Firestore)");
}

</script>

</body>
</html>
