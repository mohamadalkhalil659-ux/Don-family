<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Paste SaaS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

textarea{
  width:100%;
  height:140px;
  border:none;
  border-radius:10px;
  padding:10px;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.box{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}

a{color:#22c55e}
.top{
  background:#0f172a;
  padding:10px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="top">
<h2>🚀 Global Paste SaaS</h2>
<button onclick="login()">Login</button>
<button onclick="myPastes()">My Pastes</button>
<button onclick="home()">Home</button>
<p id="user"></p>
</div>

<div class="container">

<textarea id="text" placeholder="اكتب نصك..."></textarea><br>

<button onclick="save()">Create Link</button>

<div id="result"></div>

</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
 apiKey: "AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
 authDomain: "don-paste-189e9.firebaseapp.com",
 projectId: "don-paste-189e9",
 storageBucket: "don-paste-189e9.appspot.com",
 messagingSenderId: "177445092040",
 appId: "1:177445092040:web:fa22e602fee9fdfd4103fd"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function slug(){
 return Math.random().toString(36).substring(2,8);
}

// 🔐 login
function login(){
 let provider=new firebase.auth.GoogleAuthProvider();
 firebase.auth().signInWithPopup(provider);
}

// 👤 user
firebase.auth().onAuthStateChanged(u=>{
 if(u){
  document.getElementById("user").innerText=u.email;
 }
});

// 💾 save paste
function save(){
 let u=firebase.auth().currentUser;
 if(!u) return alert("Login first");

 let text=document.getElementById("text").value;
 let id=slug();

 db.collection("pastes").doc(id).set({
  content:text,
  userId:u.uid,
  email:u.email,
  views:0,
  created:Date.now()
 });

 let link=location.origin+"/p.html?slug="+id;

 document.getElementById("result").innerHTML=
 `<div class="box">
 🔗 Link:<br>
 <a href="${link}">${link}</a>
 </div>`;
}

// 📁 my pastes
function myPastes(){
 let u=firebase.auth().currentUser;
 if(!u) return;

 db.collection("pastes").where("userId","==",u.uid).get()
 .then(s=>{
  let html="<div class='container'><h2>My Pastes</h2>";

  s.forEach(d=>{
   html+=`<div class='box'>
    ${d.data().content}
   </div>`;
  });

  document.body.innerHTML=html+"</div>";
 });
}

// 🏠 home
function home(){
 location.reload();
}

// 🔗 open paste + views
window.onload=function(){

 let slug=new URLSearchParams(location.search).get("slug");

 if(slug){
  let ref=db.collection("pastes").doc(slug);

  ref.get().then(doc=>{
   if(doc.exists){

    ref.update({
     views:(doc.data().views||0)+1
    });

    let e=(doc.data().views||0)*0.001;

    document.body.innerHTML=`
    <div class="container">
      <pre>${doc.data().content}</pre>
      <div class="box">
        👁 Views: ${doc.data().views || 0}<br>
        💰 Earnings: $${e.toFixed(3)}
      </div>
    </div>`;
   }
  });
 }
}

</script>

</body>
</html>
