<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global SaaS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1c;
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111827;
  position:relative;
}

.logo{
  font-weight:bold;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

.menu{
  position:absolute;
  top:60px;
  right:10px;
  background:#1e293b;
  width:240px;
  border-radius:10px;
  display:none;
  flex-direction:column;
}

.menu button{
  padding:12px;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.menu button:hover{
  background:#334155;
}

/* SECTIONS */
.section{
  display:none;
  padding:30px;
  text-align:center;
}

.active{
  display:block;
}

/* HERO */
.hero{
  padding:60px 20px;
  text-align:center;
}
</style>

</head>

<body>

<nav>
  <div class="logo">🚀 Global SaaS</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">

    <button onclick="show('home')">🏠 بيت</button>
    <button onclick="show('pricing')">💰 أسعار الناشر (CPM)</button>
    <button onclick="show('payments')">💳 إثباتات الدفع</button>
    <button onclick="show('login')">🔐 تسجيل دخول</button>
    <button onclick="show('signup')">➕ إنشاء حساب</button>

  </div>
</nav>

<!-- 🏠 HOME -->
<div id="home" class="section active hero">
  <h1>أهلاً بك 👋</h1>
  <p>منصة نشر وربح احترافية</p>
</div>

<!-- 💰 CPM -->
<div id="pricing" class="section">
  <h2>💰 أسعار الناشر (CPM)</h2>

  <p>الدول العربية: 0.5$ - 2$ لكل 1000 مشاهدة</p>
  <p>أوروبا: 2$ - 6$ لكل 1000 مشاهدة</p>
  <p>أمريكا: 5$ - 12$ لكل 1000 مشاهدة</p>
</div>

<!-- 💳 PAYMENTS -->
<div id="payments" class="section">
  <h2>💳 إثباتات الدفع</h2>

  <p>📌 سيتم عرض إثباتات الدفع قريباً</p>
  <p>💡 PayPal / Payoneer / Crypto</p>
</div>

<!-- 🔐 LOGIN -->
<div id="login" class="section">
  <h2>🔐 تسجيل الدخول</h2>

  <input placeholder="Email" style="padding:10px;width:80%">
  <br><br>
  <input type="password" placeholder="Password" style="padding:10px;width:80%">
  <br><br>

  <button style="padding:10px 20px;background:#22c55e;color:white;border:none">
    دخول
  </button>
</div>

<!-- ➕ SIGNUP -->
<div id="signup" class="section">
  <h2>➕ إنشاء حساب</h2>

  <input placeholder="Email" style="padding:10px;width:80%">
  <br><br>
  <input type="password" placeholder="Password" style="padding:10px;width:80%">
  <br><br>

  <button style="padding:10px 20px;background:#22c55e;color:white;border:none">
    إنشاء حساب
  </button>
</div>

<script>

// ☰ menu
function toggleMenu(){
  let m=document.getElementById("menu");
  m.style.display = (m.style.display==="flex") ? "none" : "flex";
}

// 📌 show sections
function show(id){

  let sections=document.querySelectorAll(".section");
  sections.forEach(s=>s.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  document.getElementById("menu").style.display="none";
}

</script>

</body>
</html>
