<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Don Paste V4</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

textarea{
  width:100%;
  height:140px;
  border-radius:10px;
  border:none;
  padding:10px;
}

button{
  padding:10px 14px;
  margin:5px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.box{
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
  text-align:left;
}

.top{
  background:#0f172a;
  padding:10px;
}
a{color:#22c55e}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="top">
<h2>🚀 Don Paste V4</h2>
<button onclick="login()">Login</button>
<button onclick="home()">Home</button>
<button onclick="profile()">Profile</button>
<p id="user"></p>
</div>

<div class="container">

<textarea id="text"></textarea><br>

<button onclick="save()">Save</button>
<button onclick="myPastes()">My Pastes</button>

<div id="result"></div>

</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
 apiKey: "AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
 authDomain: "don-paste-189e9.firebaseapp.com",
 projectId: "don-paste-189e9",
 storageBucket: "don-paste-189e9.appspot.com",
 messagingSenderId: "177445092040",
 appId: "1:177445092040:web:fa22e602fee9fdfd4103fd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let editId = null;


// 🔐 login
function login(){
 let provider = new firebase.auth.GoogleAuthProvider();
 firebase.auth().signInWithPopup(provider);
}


// 👤 user
firebase.auth().onAuthStateChanged(u=>{
 if(u){
  document.getElementById("user").innerText = u.email;
 }
});


// 🧠 slug generator
function slug(){
 return Math.random().toString(36).substring(2,8);
}


// 💾 save
function save(){
 let u = firebase.auth().currentUser;
 if(!u) return alert("Login first");

 let text = document.getElementById("text").value;
 let id = slug();

 db.collection("pastes").doc(id).set({
  content:text,
  userId:u.uid,
  email:u.email,
  views:0,
  slug:id,
  created:Date.now()
 });

 let link = location.origin + location.pathname + "?p=" + id;

 document.getElementById("result").innerHTML =
 `<div class="box">
 🔗 Link:<br>
 <a href="${link}">${link}</a>
 </div>`;
}


// 📁 my pastes
function myPastes(){
 let u = firebase.auth().currentUser;
 if(!u) return;

 db.collection("pastes")
 .where("userId","==",u.uid)
 .get()
 .then(snap=>{

 let html="<div class='container'><h2>My Pastes</h2>";

 snap.forEach(d=>{
  let x=d.data();

  html+=`
  <div class="box">
   <pre>${x.content}</pre>
   👁 ${x.views}
  </div>`;
 });

 document.body.innerHTML=html+"</div>";
 });
}


// 👤 profile + earnings
function profile(){
 let u=firebase.auth().currentUser;
 if(!u) return;

 db.collection("pastes")
 .where("userId","==",u.uid)
 .get()
 .then(snap=>{

 let views=0;

 snap.forEach(d=>{
  views+=d.data().views||0;
 });

 let money=(views*0.001).toFixed(2);

 document.body.innerHTML=`
 <div class="container">
  <h2>👤 Profile</h2>
  <p>${u.email}</p>

  <div class="box">
   📊 Posts: ${snap.size}<br>
   👁 Views: ${views}<br>
   💰 Earnings: $${money}
  </div>
 </div>`;
 });
}


// 🏠 home
function home(){
 location.reload();
}


// 🔗 open paste system
window.onload=function(){

 let p=new URLSearchParams(location.search).get("p");

 if(p){
  let ref=db.collection("pastes").doc(p);

  ref.get().then(doc=>{

   if(doc.exists){

    ref.update({
     views:(doc.data().views||0)+1
    });

    document.body.innerHTML=`
    <div class="container">
     <pre>${doc.data().content}</pre>
    </div>`;
   }
  });
 }
}

</script>

</body>
</html>
