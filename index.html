<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Don Paste</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 200px;
  border-radius: 10px;
  border: none;
  padding: 10px;
}

button {
  padding: 10px 20px;
  background: #22c55e;
  border: none;
  color: white;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.box {
  background: #1e293b;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="container">

<h1>🚀 Don Paste</h1>

<div class="box">مكان إعلان</div>

<button onclick="login()">تسجيل الدخول Google</button>
<p id="user"></p>

<textarea id="text" placeholder="اكتب النص هنا..."></textarea>
<br>

<button onclick="save()">إنشاء رابط</button>
<button onclick="myPastes()">📁 نصوصي</button>

<div id="result"></div>

</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBvSyb2TjQQs11X2_5306UbCwPcbj5fHNc",
  authDomain: "don-paste-189e9.firebaseapp.com",
  projectId: "don-paste-189e9",
  storageBucket: "don-paste-189e9.appspot.com",
  messagingSenderId: "177445092040",
  appId: "1:177445092040:web:fa22e602fee9fdfd4103fd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();


// 🔐 تسجيل الدخول
function login(){
  var provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
  .then((result)=>{
    document.getElementById("user").innerText =
      "👤 مرحبًا: " + result.user.email;
  })
  .catch((error)=>{
    alert("خطأ تسجيل الدخول: " + error.message);
  });
}


// 👤 حالة المستخدم
firebase.auth().onAuthStateChanged((user)=>{
  if(user){
    document.getElementById("user").innerText =
      "👤 مرحبًا: " + user.email;
  } else {
    document.getElementById("user").innerText = "";
  }
});


// 💾 حفظ النص مع user.uid
function save(){
 let user = firebase.auth().currentUser;

 if(!user){
  alert("سجّل دخول أولاً");
  return;
 }

 let t = document.getElementById("text").value;

 db.collection("pastes").add({
  content: t,
  date: new Date().toString(),
  userId: user.uid,
  userEmail: user.email
 }).then((docRef)=>{

  let link = location.href + "#" + docRef.id;

  document.getElementById("result").innerHTML =
    "<div class='box'>رابطك:<br><a style='color:#22c55e' href='"+link+"'>"+link+"</a></div>";

 });
}


// 📁 عرض نصوص المستخدم فقط
function myPastes(){
 let user = firebase.auth().currentUser;

 if(!user){
  alert("سجّل دخول أولاً");
  return;
 }

 db.collection("pastes")
 .where("userId", "==", user.uid)
 .get()
 .then((snapshot)=>{

  let html = "<div class='container'><h2>📁 نصوصي</h2>";

  snapshot.forEach((doc)=>{

    html += `
      <div class="box">
        <pre>${doc.data().content}</pre>
      </div>
    `;
  });

  html += "</div>";

  document.body.innerHTML = html;

 });
}


// 📄 عرض نص واحد عبر الرابط
window.onload = function(){
 let id = location.hash.replace("#","");

 if(id){
  db.collection("pastes").doc(id).get().then((doc)=>{
   if(doc.exists){
    document.body.innerHTML =
      "<div class='container'><pre>"+doc.data().content+"</pre></div>";
   }
  });
 }
}

</script>

</body>
</html>
